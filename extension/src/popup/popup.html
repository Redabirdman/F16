<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>F16 Maxance Driver</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 12px;
        width: 280px;
        font-size: 13px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 600;
      }
      .row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        border-top: 1px solid #eee;
      }
      .row:first-of-type {
        border-top: none;
      }
      .label {
        color: #555;
      }
      .value {
        font-family: ui-monospace, monospace;
        font-size: 11px;
      }
      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 4px;
        vertical-align: middle;
      }
      .dot-on {
        background: #22c55e;
      }
      .dot-off {
        background: #ef4444;
      }
    </style>
  </head>
  <body>
    <h1>F16 Maxance Driver</h1>
    <div class="row">
      <span class="label">Backend</span>
      <span class="value" id="backend-status">…</span>
    </div>
    <div class="row">
      <span class="label">Active Maxance tab</span>
      <span class="value" id="maxance-tab">…</span>
    </div>
    <div class="row">
      <span class="label">Extension version</span>
      <span class="value" id="version">…</span>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
